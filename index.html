<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>筋トレカレンダー</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.jsonontent=" #4caf50">
</head>
<body>
    <div class="calendar-header">
        <button id="prev">＜</button>
        <span id="monthLabel"></span>
        <button id="next">＞</button>
    </div>

    <div class="calendar">
        <div class="day-name">日</div>
        <div class="day-name">月</div>
        <div class="day-name">火</div>
        <div class="day-name">水</div>
        <div class="day-name">木</div>
        <div class="day-name">金</div>
        <div class="day-name">土</div>

        <!-- 日付マスはJSで生成 -->
        <div id="days"></div>
    </div>
    
    <!--<div id="weeklyCount">今週 0 回</div>-->

    <!-- 選択日の筋トレ入力 -->
    <div class="workout">
        <h2 id="selectedDate">Please select a date</h2>
        <!--<textarea id="workoutText" placeholder="例：ベンチプレス 5×5&#10;スクワット 5×5"></textarea>-->

        <select class="part-select"></select>
        <textarea class="memo" style="display:none;"></textarea>

        <select class="part-select" style="display:none;"></select>
        <textarea class="memo" style="display:none;"></textarea>

        <button id="save">保存</button>
    </div>

    <script src="app.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>

</body>
</html>
